---
- name: Install sendmail
  package:
    name: sendmail
    state: present
  tags:
    - install

- name: Set relays
  blockinfile:
    path: /etc/mail/sendmail.mc
    marker: "# {mark} ANSIBLE MANAGED BLOCK #"
    block: |
      {% for item in sendmail_relays -%}
        define(`SMART_HOST', `{{ item }}')dnl
      {% endfor %}
  tags:
    - configuration
  register: set_relay
  notify:
    - "restart sendmail"

- name: compile config file
  shell: "m4 sendmail.mc > sendmail.cf"
  args:
    chdir: /etc/mail/
  when:
    set_relay.changed==true

- name: "flush handlers"
  meta: flush_handlers
